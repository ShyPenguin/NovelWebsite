#     volumes:
#       - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: frontend
    command: npx turbo run docker:with-nginx:run --filter=frontend -- --host
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: backend
    command: npx turbo run docker:with-nginx:run --filter=backend
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - minio
      - postgres

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  postgres:
    image: postgres:16
    container_name: novelwebsite_dev_psql
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: novelwebsite_dev_db
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d novelwebsite_dev_db"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
