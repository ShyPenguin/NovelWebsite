server {
    listen 10000;

    # Frontend
    location / {
        proxy_pass https://novelwebsite-frontend.onrender.com;

        proxy_set_header Host novelwebsite-frontend.onrender.com;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_ssl_name novelwebsite-frontend.onrender.com;
    }

    # Backend API
    location /api/ {
        proxy_pass https://novelwebsite-backend.onrender.com/;

        proxy_set_header Host novelwebsite-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_ssl_server_name on;
        proxy_ssl_name novelwebsite-backend.onrender.com;

    }
}